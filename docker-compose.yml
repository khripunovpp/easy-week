# Easy Week — весь стек в Docker (опция; основной путь на Пае — нативный, см. deploy/README.md).
# Запуск: cp backend/.env.example backend/.env && заполнить CF-креды && docker compose up -d --build

services:
  backend:
    build: ./backend
    restart: unless-stopped
    env_file: ./backend/.env
    environment:
      DB_PATH: /data/easy_week.db
    volumes:
      - ewdata:/data

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - '${APP_PORT:-8080}:80'
    depends_on:
      - backend

volumes:
  ewdata:
