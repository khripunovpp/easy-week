# Dev-оверрайд (подхватывается автоматически): live-reload бэкенда + монтирование кода,
# чтобы правки применялись без пересборки, а логи приложения шли сразу в контейнер.
services:
  backend:
    volumes:
      - ./backend/app:/app/app
    command:
      ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8010", "--reload"]
