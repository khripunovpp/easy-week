<div class="pp">
  <button (click)="toggle()" [class.pp__head--open]="open()" class="pp__head" type="button">
    <span class="pp__head-main">
      <span class="pp__plan-title">{{ current()?.title || 'Выбрать план' }}</span>
      @if (current(); as c) {
        <span class="pp__st pp__st--{{ c.status }}">{{ statusLabel(c.status) }}</span>
      } @else {
        &nbsp;
      }
    </span>
    <span aria-hidden="true" class="pp__toggle">
      <svg class="pp__chev" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </span>
  </button>

  @if (open()) {
    <div (click)="close()" class="pp__backdrop"></div>
    <div class="pp__menu">
      <div class="pp__search">
        <input
          (input)="onQuery($any($event.target).value)"
          [value]="query()"
          class="search-field"
          placeholder="Поиск плана"
          type="search"/>
      </div>

      @for (p of visible(); track p.id) {
        <div [class.pp__row--active]="p.id === selectedId()" class="pp__row">
          <button (click)="choose(p.id)" class="pp__opt" type="button">
            <span class="pp__opt-title">{{ p.title }}</span>
            <span class="pp__opt-sub">
              {{ p.weekLabel }} ·
              <span class="pp__st pp__st--{{ p.status }}">{{ statusLabel(p.status) }}</span>
            </span>
          </button>
          <a
            (click)="close()"
            [routerLink]="['/plan', p.id]"
            aria-label="Открыть план"
            class="pp__go">
            <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </div>
      } @empty {
        <p class="pp__empty muted">Ничего не найдено</p>
      }

      @if (hasMore()) {
        <button (click)="loadMore()" class="pp__more" type="button">Загрузить ещё</button>
      }
    </div>
  }
</div>
