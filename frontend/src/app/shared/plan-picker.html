<div class="pp">
  <button class="pp__head" type="button" [class.pp__head--open]="open()" (click)="toggle()">
    <span class="pp__head-main">
      <span class="pp__plan-title">{{ current()?.title || 'Выбрать план' }}</span>
      @if (current(); as c) {
        <span class="pp__st pp__st--{{ c.status }}">{{ statusLabel(c.status) }}</span>
      }
    </span>
    <span class="pp__toggle" aria-hidden="true">
      <svg class="pp__chev" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M6 9l6 6 6-6" stroke-linecap="round" stroke-linejoin="round" />
      </svg>
    </span>
  </button>

  @if (open()) {
    <div class="pp__backdrop" (click)="close()"></div>
    <div class="pp__menu">
      <div class="pp__search">
        <input
          class="pp__search-input"
          type="search"
          placeholder="Поиск плана"
          [value]="query()"
          (input)="onQuery($any($event.target).value)" />
      </div>

      @for (p of visible(); track p.id) {
        <div class="pp__row" [class.pp__row--active]="p.id === selectedId()">
          <button class="pp__opt" type="button" (click)="choose(p.id)">
            <span class="pp__opt-title">{{ p.title }}</span>
            <span class="pp__opt-sub">
              {{ p.weekLabel }} ·
              <span class="pp__st pp__st--{{ p.status }}">{{ statusLabel(p.status) }}</span>
            </span>
          </button>
          <a
            class="pp__go"
            [routerLink]="['/plan', p.id]"
            (click)="close()"
            aria-label="Открыть план">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M9 6l6 6-6 6" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </a>
        </div>
      } @empty {
        <p class="pp__empty muted">Ничего не найдено</p>
      }

      @if (hasMore()) {
        <button class="pp__more" type="button" (click)="loadMore()">Загрузить ещё</button>
      }
    </div>
  }
</div>
