# nginx для Easy Week: раздаёт собранный фронт + проксирует /api на бэкенд.
# Слушает :8080, чтобы не конфликтовать с perdulário на :80.
# Скопировать в /etc/nginx/sites-available/easy-week и включить симлинком.

server {
  listen 8080;
  server_name _;

  # Собранный фронт (frontend/dist/frontend/browser)
  root /home/pashtitto/easy-week/frontend/dist/frontend/browser;
  index index.html;

  # API → локальный бэкенд (systemd-сервис easy-week-backend на 8010)
  location /api/ {
    proxy_pass http://127.0.0.1:8010;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Connection '';
    # Генерация плана/полного рецепта может занять до ~30с
    proxy_read_timeout 120s;
    # SSE (потоковая генерация плана/списка) — не буферизуем, шлём события сразу
    proxy_buffering off;
    proxy_cache off;
  }

  # Метрики Prometheus (бэкенд слушает только localhost) — доступны в домашней сети.
  # Секретов нет, только счётчики. Prometheus на самом Пае скрапит 127.0.0.1:8010 напрямую.
  location = /metrics {
    proxy_pass http://127.0.0.1:8010/metrics;
  }

  # PWA: service worker и index не кэшируем, чтобы обновления доезжали
  location = /ngsw-worker.js {
    add_header Cache-Control "no-cache";
  }
  location = /index.html {
    add_header Cache-Control "no-cache";
  }

  # Статика с хэшами — кэшируем надолго
  location ~* \.(?:js|css|woff2?|png|jpg|jpeg|gif|svg|ico|webmanifest)$ {
    expires 30d;
    add_header Cache-Control "public";
  }

  # SPA-роутинг Angular
  location / {
    try_files $uri $uri/ /index.html;
  }
}
