# Promtail локально (Docker): AI-лог из тома ewdata (/data/ai-logs).
server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: warn

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: easy-week-ai
    static_configs:
      - targets: [localhost]
        labels:
          job: easy-week-ai
          __path__: /data/ai-logs/*.jsonl
    pipeline_stages:
      - json:
          expressions:
            provider: provider
            model: model
            label: label
      - labels:
          provider:
          model:
