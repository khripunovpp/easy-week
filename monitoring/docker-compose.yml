# Локальный мониторинг-стек (Docker). Запускать ПОСЛЕ основного стека приложения
# (нужны его сеть easy-week_default и том easy-week_ewdata с AI-логами):
#   docker compose -f monitoring/docker-compose.yml up -d
# Grafana: http://localhost:3000 (admin/admin)
services:
  prometheus:
    image: prom/prometheus:v2.53.2
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.docker.yml:/etc/prometheus/prometheus.yml:ro
      - promdata:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.retention.time=30d

  loki:
    image: grafana/loki:3.3.2
    restart: unless-stopped
    user: root  # том lokidata создаётся root-овым; loki иначе не может писать (только локально)
    volumes:
      - ./loki/loki-config.yml:/etc/loki/config.yml:ro
      - lokidata:/var/lib/loki
    command: -config.file=/etc/loki/config.yml

  promtail:
    image: grafana/promtail:3.3.2
    restart: unless-stopped
    volumes:
      - ./promtail/promtail.docker.yml:/etc/promtail/config.yml:ro
      - easy-week_ewdata:/data:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on: [loki]

  grafana:
    image: grafana/grafana:11.3.1
    restart: unless-stopped
    ports:
      - '3000:3000'
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    volumes:
      - ./grafana/datasources.docker.yml:/etc/grafana/provisioning/datasources/ds.yml:ro
      - ./grafana/dashboards-provider.yml:/etc/grafana/provisioning/dashboards/provider.yml:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafanadata:/var/lib/grafana
    depends_on: [prometheus, loki]

networks:
  default:
    name: easy-week_default
    external: true

volumes:
  promdata:
  lokidata:
  grafanadata:
  easy-week_ewdata:
    external: true
