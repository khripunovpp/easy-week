# Prometheus локально (Docker): скрапит бэкенд-контейнер по имени сервиса.
global:
  scrape_interval: 15s
  scrape_timeout: 10s

scrape_configs:
  - job_name: easy-week-backend
    metrics_path: /metrics
    static_configs:
      - targets: ['backend:8010']

  - job_name: prometheus
    static_configs:
      - targets: ['localhost:9090']
